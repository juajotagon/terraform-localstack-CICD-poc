name: CI/CD Localstack/Terraform Workflow

on: 
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  terraform-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
      
      - name: Setup de Terraform
        uses: hashicorp/setup-terraform@v4
      
      - name: Terraform init
        working-directory: ./terraform 
        run: terraform init
      
      - name: Terraform - Check de formato
        working-directory: ./terraform
        run: terraform fmt -check 
      
      - name: Terraform - Validar proyecto.
        working-directory: ./terraform
        run: terraform validate
      
      - name: Terraform plan
        working-directory: ./terraform
        run: terraform plan

  localstack-api-docker-compose:
    runs-on: ubuntu-latest
    needs: terraform-check
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
      
      - name: Setup de Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Levantar los contenedores.
        run: docker compose up -d --build

      - name: Terraform init
        working-directory: ./terraform 
        run: terraform init

      - name: Terraform apply
        working-directory: ./terraform 
        run: terraform apply -auto-approve        

      - name: API Test
        run: |
          docker compose ps
          sleep 10
          
          export AWS_ACCESS_KEY_ID=test
          export AWS_SECRET_ACCESS_KEY=test
          export AWS_DEFAULT_REGION=us-east-1

          curl -f http://localhost:8000/objects

          aws --endpoint-url=http://localhost:4566 sqs list-queues

          curl -X POST http://localhost:8000/objects \
          -H "Content-Type: application/json" \
          -d '{"accion": "test", "cola": "numero1"}'

          curl -X POST http://localhost:8000/objects \
          -H "Content-Type: application/json" \
          -d '{"accion": "test", "cola": "numero2"}'

          aws --endpoint-url=http://localhost:4566 sqs receive-message --queue-url http://localhost:4566/000000000000/queue-local

          curl -f http://localhost:8000/objects

          aws --endpoint-url=http://localhost:4566 sqs purge-queue --queue-url http://localhost:4566/000000000000/queue-local

          aws --endpoint-url=http://localhost:4566 s3 rm s3://bucket-local --recursive
          
      - name: Terraform destroy
        working-directory: ./terraform 
        run: terraform destroy -auto-approve    

      - name: Eliminar los contenedores
        if: always()
        run: |
          docker compose down -v

      