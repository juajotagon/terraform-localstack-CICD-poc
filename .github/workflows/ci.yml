name: CI/CD Localstack/Terraform Workflow

on: 
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  terraform-check:
    runs-on: ubuntu-latest
    steps:
      - name: Hacer un checkout
        uses: actions/checkout@v4
      
      - name: Setup de Terraform
        uses: hashicorp/setup-terraform@v4
      
      - name: Terraform init
        working-directory: ./terraform 
        run: terraform init
      
      - name: Terraform - Check de formato
        working-directory: ./terraform
        run: terraform fmt -check 
      
      - name: Terraform - Validar proyecto.
        working-directory: ./terraform
        run: terraform validate
      
      - name: Terraform plan
        working-directory: ./terraform
        run: terraform plan

  localstack-api-docker-compose:
    runs-on: ubuntu-latest
    needs: terraform-check
    steps:
      - name: Setup de Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Levantar los contenedores.
        working-directory: ./
        run: docker compose up -d --build

      - name: Terraform init
        working-directory: ./terraform 
        run: terraform init

      - name: Terraform apply
        working-directory: ./terraform 
        run: terraform apply -auto-approve        

      - name: API Test
        working-directory: ./
        run: |
          docker compose ps
          sleep 10
          curl -f http://localhost:8000/objects

      - name: Terraform destroy
        working-directory: ./terraform 
        run: terraform destroy -auto-approve    

      - name: Eliminar los contenedores
        working-directory: ./
        if: always()
        run: |
          docker compose down -v

      