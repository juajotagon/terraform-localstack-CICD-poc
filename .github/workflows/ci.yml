name: CI/CD Localstack/Terraform Workflow

on: 
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  localstack-terraform-check:
    runs-on: ubuntu-latest
    steps:
      - name: Hacer un checkout
        uses: actions/checkout@v4
      
      - name: Setup de Terraform
        uses: hashicorp/setup-terraform@v4
      
      - name: Terraform init
        working-directory: ./terraform 
        run: terraform init
      
      - name: Terraform - Check de formato
        working-directory: ./terraform
        run: terraform fmt -check 
      
      - name: Terraform - Validar proyecto.
        working-directory: ./terraform
        run: terraform validate